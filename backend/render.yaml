services:
  - type: web
    name: councils-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npx prisma db seed
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PORT
        value: 3000
